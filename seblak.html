</html><!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Seblak By RolanDev</title>

<style>
*{
    margin:0;
    padding:0;
    box-sizing:border-box;
    font-family:Arial, Helvetica, sans-serif;
}

body{
    overflow:hidden;
    height:100vh;
    display:flex;
    justify-content:center;
    align-items:center;
    background:black;
    color:white;
}

/* Background RGB */
.bg{
    position:fixed;
    width:100%;
    height:100%;
    background:
    linear-gradient(90deg, rgba(0,255,255,.15) 1px, transparent 1px),
    linear-gradient(rgba(255,0,120,.15) 1px, transparent 1px);
    background-size:35px 35px;
    animation:bgMove 5s linear infinite;
}

@keyframes bgMove{
    from{
        transform:translateY(0);
    }
    to{
        transform:translateY(35px);
    }
}

.box{
    position:relative;
    z-index:2;
    width:350px;
    padding:40px;
    text-align:center;
    background:rgba(255,255,255,0.07);
    border-radius:25px;
    backdrop-filter:blur(10px);
    box-shadow:0 0 25px cyan;
}

h1{
    font-size:30px;
    margin-bottom:40px;
    text-shadow:0 0 15px cyan;
}

button{
    border:none;
    cursor:pointer;
    padding:14px 28px;
    font-size:18px;
    font-weight:bold;
    border-radius:15px;
    transition:.2s;
}

/* Tombol jebakan */
#yesBtn{
    position:absolute;
    background:#ff004c;
    color:white;
    left:100px;
    top:145px;
}

/* Tombol asli */
#buyBtn{
    background:lime;
    color:black;
    margin-top:90px;
}

#buyBtn:hover{
    transform:scale(1.1);
}

.watermark{
    margin-top:25px;
    opacity:.7;
}
</style>
</head>

<body>

<div class="bg"></div>

<div class="box">
    <h1>Pengen Seblak Beli Cah? 🌶️</h1>

    <!-- Tombol palsu -->
    <button id="yesBtn">Ya</button>

    <!-- Tombol asli -->
    <button id="buyBtn">Mong</button>

    <div class="watermark">By : RolanDev</div>
</div>

<script>
const fakeBtn = document.getElementById("yesBtn");
const realBtn = document.getElementById("buyBtn");

/* Tombol pindah terus */
function moveButton(){

    const maxX = window.innerWidth - fakeBtn.offsetWidth - 5;
    const maxY = window.innerHeight - fakeBtn.offsetHeight - 5;

    const randomX = Math.random() * maxX;
    const randomY = Math.random() * maxY;

    fakeBtn.style.left = randomX + "px";
    fakeBtn.style.top = randomY + "px";
}

/* Saat mouse mendekat */
fakeBtn.addEventListener("mouseover", moveButton);

/* Saat mau disentuh HP */
fakeBtn.addEventListener("touchstart", (e)=>{
    e.preventDefault();
    moveButton();
});

/* Kalau pencet tidak */
realBtn.addEventListener("click", ()=>{
    alert("Yahh ora sida tuku seblak🗿😭");
});
</script>

</body>
</html>
